services:
  mongo:
    image: mongo:latest
    container_name: ecommerce-mongo
    restart: always
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    container_name: ecommerce-backend
    restart: always
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/ecommerce
      - JWT_SECRET=supersecretjwtkey123
    ports:
      - '5000:5000'
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: ecommerce-frontend
    restart: always
    ports:
      - '8080:80' # Expose directly as an option, but proxy routes to 80

  nginx:
    image: nginx:alpine
    container_name: ecommerce-nginx
    restart: always
    ports:
      - '80:80'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend

volumes:
  mongo-data:
