# Define the Rate Limit Zone (10MB of memory, 10 requests per second)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# Define the Upstream (Backend) to allow for easier scaling
upstream backend_servers {
    server backend:5000;
}

# Define the Upstream (Frontend)
upstream frontend_servers {
    server frontend:80;
}

server {
    listen 80;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "no-referrer-when-downgrade";
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'; frame-ancestors 'self';";

    # Buffer Limits to prevent attacks
    client_body_buffer_size 10K;
    client_header_buffer_size 1k;
    client_max_body_size 8m;
    large_client_header_buffers 2 1k;

    location /api/ {
        # Apply the Rate Limit
        limit_req zone=api_limit burst=5 nodelay;

        proxy_pass http://backend_servers;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location / {
        proxy_pass http://frontend_servers;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
