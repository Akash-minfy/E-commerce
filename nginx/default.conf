# Define the Rate Limit Zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;

    # Use Docker's internal DNS resolver to prevent stale IPs
    resolver 127.0.0.11 valid=30s;

    # Set variables for upstreams to force dynamic DNS resolution
    set $backend_upstream http://backend:5000;
    set $frontend_upstream http://frontend:80;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "no-referrer-when-downgrade";
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'; frame-ancestors 'self';";

    # Buffer Limits
    client_body_buffer_size 128k;
    client_header_buffer_size 2k;
    client_max_body_size 10m;
    large_client_header_buffers 4 4k;

    location /api/ {
        # Apply the Rate Limit
        limit_req zone=api_limit burst=5 nodelay;

        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location / {
        proxy_pass $frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
